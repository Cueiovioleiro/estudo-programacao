<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro - evilaliance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <p class="auth-back"><a href="index.html">← Voltar ao início</a></p>
        <div class="auth-tabs">
            <button id="login-tab" class="tab active">Login</button>
            <button id="register-tab" class="tab">Cadastro</button>
        </div>

        <div id="login-form" class="form-container active">
            <h2>Entrar</h2>
            <form id="login">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>

        <div id="register-form" class="form-container">
            <h2>Cadastrar</h2>
            <form id="register">
                <input type="text" id="register-name" name="full_name" placeholder="Nome" required autocomplete="name">
                <input type="email" id="register-email" name="email" placeholder="Email" required autocomplete="email">
                <label for="register-birth" class="auth-label"> </label>
                <input type="date" id="register-birth" name="birth_date" required autocomplete="bday">
                <input type="password" id="register-password" name="password" placeholder="Senha" required autocomplete="new-password" minlength="6">
                <input type="password" id="register-password2" name="password_confirm" placeholder="Confirmar Senha" required autocomplete="new-password" minlength="6">
                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>

    <!-- Botão de configurações -->
    <button id="settings-btn" class="settings-btn">⚙️</button>

    <!-- Painel de configurações -->
    <div id="settings-panel" class="settings-panel">
        <h3>Configurações</h3>
        <div class="setting-item">
            <label for="dk">Modo escuro</label>
            <button id="dk" type="button">Claro</button>
        </div>
        <button id="close-settings">Fechar</button>
    </div>

    <script type="module" src="js/pages/login.page.js"></script>
</body>
</html>
