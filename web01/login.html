<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DevFlow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <h2 id="formTitle">Entrar na conta</h2>
        
        <!-- Formulário de Login -->
        <form id="login">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <!-- Formulário de Cadastro (inicialmente oculto) -->
        <form id="register" style="display:none;">
            <input type="text" placeholder="Nome Completo" required>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Senha" required>
            <input type="password" placeholder="Confirmar Senha" required>
            <button type="submit" class="btn-primary">Criar Conta</button>
        </form>

        <p class="toggle-text">
            Não tem conta? 
            <span onclick="toggleForm()" id="toggleLink">Criar conta</span>
        </p>
    </div>

    <script type="module" src="auth-supabase.js"></script>
    <script src="script.js"></script>
</body>
</html>
